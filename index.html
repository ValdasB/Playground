<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#13212b">
  <title>Playground</title>
  <style>
    :root {
      --bg: #13212b;
      --panel: #1d3442;
      --ink: #f6f0e5;
      --muted: #d5cab7;
      --accent: #d97b29;
      --border: #35515f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background: linear-gradient(180deg, #0f1b22 0, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .pages {
      display: grid;
      gap: 14px;
      margin-top: 34px;
      padding: 0;
      list-style: none;
    }

    .page-link {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      transition: border-color 140ms ease, transform 140ms ease;
    }

    .page-link:hover,
    .page-link:focus-visible {
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }

    .page-title {
      display: block;
      margin-bottom: 4px;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .page-description {
      display: block;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main>
    <h1>Playground</h1>
    <p>Small experiments and test pages published from this repository.</p>

    <ul class="pages" aria-label="Pages">
      <li>
        <a class="page-link" href="scanner.html">
          <span class="page-title">Backyard Scanner Performance Test</span>
          <span class="page-description">Camera scanner test page.</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
